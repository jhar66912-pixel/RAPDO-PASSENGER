<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD000" />
      <stop offset="100%" stop-color="#FF9900" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="transparent" rx="128" />
  
  <!-- Outer Ring glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFD000" stroke-width="12" opacity="0.1" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gradient1)" stroke-width="8" stroke-dasharray="80 40 40 40 100 40" transform="rotate(-45 256 256)" />
  
  <!-- Mobility Arrow / Forward Motion Shape -->
  <path d="M150 320 L270 150 L380 150 L260 320 Z" fill="url(#gradient1)" />
  <path d="M220 360 L310 230 L380 230 L290 360 Z" fill="#FFE066" opacity="0.9" />
  
  <!-- Typography RAHI -->
  <text x="256" y="440" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">RAHI</text>
</svg>
